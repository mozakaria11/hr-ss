plugins { id 'com.android.application' }

android {
    namespace 'com.sawaedarab.employee'
    compileSdk 35

    defaultConfig {
        applicationId 'com.sawaedarab.employee'
        minSdk 23
        targetSdk 35
        versionCode 11000
        versionName '1.10.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
