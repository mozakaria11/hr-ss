name: Build Sawaed Employee APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    name: Build installable debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.9'
          cache-provider: basic

      - name: Build APK
        run: gradle --no-daemon clean assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk Sawaed-Employee-1.12.0.apk

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: Sawaed-Employee-APK-1.12.0
          path: Sawaed-Employee-1.12.0.apk
          if-no-files-found: error
          retention-days: 30
